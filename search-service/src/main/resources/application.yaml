server:
  port: 8087  # 端口不能重合
hm:
  db:
    database: hm-item
  swagger:
    title: "黑马商城商品搜索服务接口文档"
    package: com.hmall.search.controller
    description: "黑马商城商品搜索服务接口文档"
  elasticsearch:
    host: 192.168.31.128
    port: 9200
spring:
  rabbitmq:
    host: 192.168.31.128
    port: 5672 # 端口
    virtual-host: /hmall # 虚拟主机
    username: hmall # 用户名
    password: 123 # 密码
    listener:
      simple:
        prefetch: 1 #每次处理一条消息，谁处理的快谁就处理的多
        acknowledge-mode: auto # 消费者确认机制，springAMQP自动处理，若nack则再次投递消息
        retry:
          enabled: true # 开启消费者失败重试机制，消费者异常时利用本地重试，而不是无限的requeue到mq与mq之间无限投递重试
          initial-interval: 1000ms # 失败后的初始等待时间
          multiplier: 1 # 失败后下次的等待时间倍数，下次的等待时常 = initial-interval * multiplier
          max-attempts: 3 # 最大重试次数
          stateless: true # true无状态；false有状态。如果业务中包含"事务"Transactional，这里才改为false
  redis:
    redisson:
      config:
      # singleServerConfig:
      #   connectionPoolSize: 256    # 调大这个
      #   connectionMinimumIdleSize: 32
      #   connectTimeout: 10000     # 增加连接超时时间
      #   timeout: 3000              # 增加命令执行超时时间
    cluster:
      nodes:
        - 192.168.31.128:7001
        - 192.168.31.128:7002
        - 192.168.31.128:7003
        - 192.168.31.128:7004
        - 192.168.31.128:7005
        - 192.168.31.128:7006
    lettuce:
      timeout: 3s
      cluster:
        refresh:
          adaptive: true
          period: 30s
      pool:
        # max-active: 32    # 连接池最大连接数
        # max-wait: -1ms   # 连接池最大阻塞等待时间
        # max-idle: 32      # 连接池中的最大空闲连接
        # min-idle: 0      # 连接池中的最小空闲连接
        max-active: 16
        max-wait: 3000ms
        max-idle: 32
        min-idle: 16